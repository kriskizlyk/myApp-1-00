<style>
:root{--bg:#0f1117;--bg2:#1a1d2e;--card:rgba(255,255,255,0.05);--t1:#e8e8ed;--t2:#888;--t3:#555;--bs:rgba(255,255,255,0.06);--bl:rgba(255,255,255,0.1);--g:#4CAF50;--gd:#2E7D32;--r:#e53935;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',-apple-system,sans-serif;background:linear-gradient(145deg,var(--bg)0%,var(--bg2)50%,var(--bg)100%);color:var(--t1);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative}
.hidden{display:none!important}
input,select{font-size:16px!important}
.install-banner{padding:12px 20px;background:linear-gradient(135deg,rgba(76,175,80,0.15),rgba(46,125,50,0.15));border-bottom:1px solid rgba(76,175,80,0.2);display:flex;align-items:center;justify-content:space-between;gap:12px;animation:fadeSlideIn .4s ease}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}

.auth-box{width:100%;max-width:320px}
.auth-input{width:100%;padding:14px 18px;background:rgba(255,255,255,0.06);border:1px solid var(--bl);border-radius:14px;color:var(--t1);font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px;transition:border-color .2s}.auth-input:focus{border-color:var(--g)}
.auth-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--g),var(--gd));border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:16px}.auth-btn:active{opacity:.85}.auth-btn:disabled{opacity:.5}

.header{padding:calc(16px + var(--st))20px 12px;position:sticky;top:0;z-index:10;background:rgba(15,17,23,0.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid var(--bs);display:flex;align-items:center;justify-content:space-between}

.header-center{display:flex;align-items:center;gap:10px;min-width:0;flex:1;justify-content:center}

.grip-icon{font-size:20px;color:#666;line-height:1}.reorder-icon{font-size:22px;flex-shrink:0}
.reorder-name{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.reorder-count{font-size:12px;color:#666;flex-shrink:0}
.confirm-ov{position:absolute;inset:0;background:rgba(15,17,23,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:16px;z-index:5}

.btn-yes{background:var(--r);border:none;color:#fff;padding:6px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

.input-row{display:flex;gap:8px;margin-bottom:16px;align-items:center}

.mf-title{font-size:16px;font-weight:700;margin-bottom:14px}.mf-grid{display:flex;flex-direction:column;gap:12px}.mf-field{display:flex;flex-direction:column;gap:4px;flex:1}.mf-row2{display:flex;gap:10px}

// Image compression
function compressImg(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>h){if(w>800){h=(h*800)/w;w=800}}else{if(h>800){w=(w*800)/h;h=800}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',0.8))};img.src=e.target.result};r.readAsDataURL(file)})}

// AI identify
async function identifyImg(dataUrl){
  const key=getApiKey();
  if(!key)return"(set API key in Account to enable AI)";
  try{
    const parts=dataUrl.split(',');
    const meta=parts[0];
    const b64=parts[1];
    const mtype=meta.match(/data:(.*?);/)?.[1]||'image/jpeg';
    const listName=gC(aCat)?.name||"";
    const prompt='Read all text, labels, brand names, and model numbers visible in this image. Identify the exact product or item.'+(listName?' This is for a list called "'+listName+'".':'')+' If in packaging, identify the product inside. Reply with ONLY the item name (2-10 words). Be as specific as possible using what you can read.';
    const body={model:'claude-sonnet-4-20250514',max_tokens:60,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mtype,data:b64}},{type:'text',text:prompt}]}]};
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(body)});
    const txt=await r.text();
    if(!r.ok){alert('API Error '+r.status+':\n'+txt);return"(API "+r.status+")"}
    const d=JSON.parse(txt);
    return d.content?.[0]?.text?.trim().replace(/[.!,"']$/,'')||""
  }catch(e){alert('Error: '+e.message);return"(Error: "+e.message+")"}
}

let lastAutoBackup=0;const AUTO_BACKUP_INTERVAL=60*1000;let changeLog=[];

function autoBackup(){
  if(DEV_MODE||!user||!changeLog.length)return;
  const now=Date.now();
  if(now-lastAutoBackup<AUTO_BACKUP_INTERVAL)return;
  lastAutoBackup=now;
  const changes=changeLog.length?changeLog.join(", "):"No tracked changes";
  const data={categories:cats,items:items,anthropicKey:userApiKey,createdAt:firebase.firestore.FieldValue.serverTimestamp(),auto:true,changes:changes};
  changeLog=[];
  fbDb.collection("users").doc(user.uid).collection("backups").add(data).then(()=>{
    fbDb.collection("users").doc(user.uid).collection("backups").orderBy("createdAt","desc").get().then(snap=>{
      const autoDocs=[...snap.docs].filter(d=>d.data().auto===true);
      if(autoDocs.length>20){autoDocs.slice(20).forEach(d=>d.ref.delete())}
    }).catch(()=>{});

}

function prog(id){const l=items[id]||[];if(!l.length)return 0;if(l[0]&&l[0].liters!==undefined)return 0;return Math.round(l.filter(i=>i.done).length/l.length*100)}

// Drag
function dStart(idx,cY){const row=rowRefs[idx];if(!row)return;dragIdx=idx;dragOverIdx=idx}
function dMove(cY){if(dragIdx===null)return;for(let i=0;i<rowRefs.length;i++){const row=rowRefs[i];if(!row)continue;const r=row.getBoundingClientRect();if(cY<r.top+r.height/2){dragOverIdx=i;rHome();return}dragOverIdx=i}rHome()}
function dEnd(){if(dragIdx===null||dragOverIdx===null||dragIdx===dragOverIdx){dragIdx=null;dragOverIdx=null;return}const nc=[...cats];const[m]=nc.splice(dragIdx,1);nc.splice(dragOverIdx,0,m);cats=nc;dragIdx=null;dragOverIdx=null;save();rHome()}

function getLoc(){if(!navigator.geolocation){document.getElementById('mf-address').value="Not supported";return}locLoading=true;const btn=document.getElementById('loc-btn');if(btn){btn.disabled=true;btn.innerHTML='<span style="display:inline-block;animation:spin 1s linear infinite">⟳</span>'}navigator.geolocation.getCurrentPosition(async pos=>{const{latitude:lat,longitude:lon}=pos.coords;try{const r=await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon+'&zoom=18&addressdetails=1',{headers:{"Accept-Language":"en"}});const d=await r.json();if(d&&d.address){const a=d.address;const p=[a.house_number,a.road,a.city||a.town||a.village,a.state||a.province].filter(Boolean);document.getElementById('mf-address').value=p.join(", ")||d.display_name||lat.toFixed(5)+", "+lon.toFixed(5)}else{document.getElementById('mf-address').value=lat.toFixed(5)+", "+lon.toFixed(5)}}catch(e){document.getElementById('mf-address').value=lat.toFixed(5)+", "+lon.toFixed(5)}locLoading=false;if(btn){btn.disabled=false;btn.innerHTML="📍"}},err=>{locLoading=false;if(btn){btn.disabled=false;btn.innerHTML="📍"}document.getElementById('mf-address').value=err.code===1?"Permission denied":"Could not get location"},{enableHighAccuracy:true,timeout:10000})}

function rHome(){

  if(reorder){g.className="reorder-list";let dc=cats.map((c,i)=>({cat:c,origIdx:i}));if(dragIdx!==null&&dragOverIdx!==null&&dragIdx!==dragOverIdx){const[m]=dc.splice(dragIdx,1);dc.splice(dragOverIdx,0,m)}dc.forEach((item,di)=>{const c=item.cat;const isDrag=dragIdx!==null&&item.origIdx===dragIdx;const d=document.createElement("div");d.className="reorder-card"+(isDrag?" dragging":"");d.style.borderLeft="4px solid "+c.color;rowRefs[di]=d;d.innerHTML='<div class="drag-handle"><span class="grip-icon">⠿</span></div><span class="reorder-icon">'+c.icon+'</span><span class="reorder-name">'+esc(c.name)+'</span><span class="reorder-count">'+((c.type||"standard")==="mileage"?"⛽":(items[c.id]||[]).length+" items")+'</span>';const h=d.querySelector('.drag-handle');h.addEventListener('touchstart',e=>{e.preventDefault();dStart(di,e.touches[0].clientY)});h.addEventListener('mousedown',e=>{e.preventDefault();dStart(di,e.clientY)});g.appendChild(d)})}
  else{g.className="grid";cats.forEach((c,i)=>{const l=items[c.id]||[],isM=(c.type||"standard")==="mileage";const dn=isM?0:l.filter(x=>x.done).length,p=isM?0:prog(c.id);const ct=isM?l.length+" entr"+(l.length===1?"y":"ies"):(l.length?dn+"/"+l.length+" done":"No items");let msub="";if(isM&&l.length>0){let tL=0,tK=0;l.forEach(e=>{tL+=e.liters;tK+=e.curKm-e.prevKm});if(tK>0)msub="Avg: "+fN((tL/tK)*100)+" L/100km"}const d=document.createElement("div");d.className="card";d.style.borderLeft="4px solid "+c.color;d.style.animationDelay=i*.08+"s";d.onclick=()=>oList(c.id);d.innerHTML='<div class="card-top"><span class="card-icon">'+c.icon+'</span><button class="card-del" onclick="event.stopPropagation();cfm=\'cat-'+c.id+'\';rHome()">×</button></div><div class="card-title">'+esc(c.name)+'</div><div class="card-count">'+ct+'</div>'+(msub?'<div class="card-sub" style="color:#4CAF50">'+msub+'</div>':'')+(!isM&&l.length?'<div class="progress-track"><div class="progress-bar" style="width:'+p+"%;background:"+c.color+'"></div></div>':'')+(isM?'<div class="type-badge" style="border-color:'+c.color+'">⛽ Mileage</div>':'')+(cfm==="cat-"+c.id?'<div class="confirm-ov" onclick="event.stopPropagation()"><p>Delete this list?</p><div class="btns"><button class="btn-yes" onclick="dCat(\''+c.id+"')\">Yes</button><button class=\"btn-no\" onclick=\"cfm=null;rHome()\">No</button></div></div>":"");g.appendChild(d)});const a=document.createElement("div");a.className="card add-card";a.onclick=()=>sNLM();a.innerHTML='<span class="add-card-plus">+</span><p class="add-card-text">New List</p>';g.appendChild(a)}
}

function oList(id){aCat=id;cfm=null;eiId=null;eLN=false;mfOpen=false;mfEdit=null;pendingImg=null;pendingLabel="";aiLoading=false;reorder=false;$("reorder-btn").className="reorder-btn";$("reorder-btn").textContent="↕ Reorder";$("home-view").classList.add("hidden");$("list-view").classList.remove("hidden");rList()}

  if(l.length)s+='<div class="list-progress"><div class="progress-track lg"><div class="progress-bar" style="width:'+p+"%;background:"+c.color+'"></div></div><span class="progress-label">'+p+"%</span></div>";

  else{s+='<div>';pn.forEach(it=>{s+=iH(it,c,false)});if(cp.length){s+='<div class="completed-hdr"><span class="completed-lbl">Completed ('+cp.length+')</span><button class="clear-btn" onclick="cD()">Clear all</button></div>';cp.forEach(it=>{s+=iH(it,c,true)})}s+="</div>";s+='<div class="action-bar"><button class="act-btn" onclick="uA()">↩️ Uncheck All</button><button class="act-btn" onclick="dL()">📋 Duplicate</button></div>'}

const img=it.image?'<img class="item-thumb" src="'+it.image+'" onclick="event.stopPropagation();viewImg(\''+it.id+'\')" />':'';

return '<div class="item'+(dn?" done":"")+'"><button class="cb" style="'+cs+'" onclick="tI(\''+it.id+"')\">"+(dn?"✓":"")+'</button><div class="item-content">'+img+t+'</div><button class="xfer-btn" onclick="sXM(\''+it.id+"')\">↗</button>"+d+"</div>"}

function rMileage(c){const ct=$("list-content"),entries=items[aCat]||[];let avgL100=0,totalL=0,totalCost=0,totalKm=0;entries.forEach(e=>{totalL+=e.liters;totalCost+=(e.costPerL||0)*e.liters;totalKm+=e.curKm-e.prevKm});if(totalKm>0)avgL100=(totalL/totalKm)*100;let s="";if(entries.length>0){s+='<div class="stats-row"><div class="stat-card"><div class="stat-val">'+fN(avgL100)+'</div><div class="stat-lbl">Avg L/100km</div></div><div class="stat-card"><div class="stat-val">'+entries.length+'</div><div class="stat-lbl">Fill-ups</div></div><div class="stat-card"><div class="stat-val">'+fN(totalKm,0)+'</div><div class="stat-lbl">Total km</div></div></div>'}if(!mfOpen){s+='<button class="mileage-add-btn" style="background:'+c.color+'" onclick="openMF()">+ Add Fuel Entry</button>'}if(mfOpen){const ed=mfEdit;const prevAuto=!ed&&entries.length>0?entries[entries.length-1].curKm:"";s+='<div class="mileage-form"><div class="mf-title">'+(ed?"Edit Entry":"New Fuel Entry")+'</div><div class="mf-grid"><div class="mf-field"><label class="mf-label">Date</label><input class="mf-input" type="date" id="mf-date" value="'+(ed?ed.date:new Date().toISOString().split("T")[0])+'" /></div><div class="mf-field"><label class="mf-label">Fuel Station</label><select class="mf-select" id="mf-station"><option value="">— Select station —</option>';FSTATIONS.filter(Boolean).forEach(st=>{s+='<option value="'+st+'"'+((ed&&ed.station===st)?' selected':'')+'>'+st+'</option>'});s+='</select></div><div class="mf-field"><label class="mf-label">Address / Location</label><div class="mf-input-row"><input class="mf-input" style="flex:1" type="text" id="mf-address" placeholder="e.g. 123 Main St, Saskatoon" value="'+esc(ed?ed.address||"":"")+'" /><button class="mf-loc-btn" id="loc-btn" onclick="getLoc()">📍</button></div></div><div class="mf-row2"><div class="mf-field"><label class="mf-label">Cost per Liter ($)</label><input class="mf-input" type="number" step="0.001" id="mf-cpl" placeholder="0.000" value="'+(ed?ed.costPerL||"":"")+'" oninput="mfCalc()" /></div><div class="mf-field"><label class="mf-label">Liters</label><input class="mf-input" type="number" step="0.01" id="mf-lit" placeholder="0.00" value="'+(ed?ed.liters||"":"")+'" oninput="mfCalc()" /></div></div><div class="mf-row2"><div class="mf-field"><label class="mf-label">Current Mileage (km)</label><input class="mf-input" type="number" step="0.1" id="mf-cur" placeholder="0" value="'+(ed?ed.curKm||"":"")+'" oninput="mfCalc()" /></div><div class="mf-field"><label class="mf-label">Previous Mileage (km)</label><div class="mf-input-row"><input class="mf-input" style="flex:1" type="number" step="0.1" id="mf-prev" placeholder="0" value="'+(ed?ed.prevKm||"":prevAuto)+'" oninput="mfCalc()" />'+(entries.length>0?'<button class="mf-auto-btn" style="background:'+c.color+'" onclick="document.getElementById(\'mf-prev\').value=\''+entries[entries.length-1].curKm+'\';mfCalc()">↩</button>':'')+'</div></div></div></div><div id="mf-calc"></div><div class="mf-btns"><button class="m-cancel" onclick="mfOpen=false;mfEdit=null;rList()">Cancel</button><button class="m-create" style="background:linear-gradient(135deg,'+c.color+','+c.color+'dd)" onclick="saveMF()">'+(ed?"Save":"Add Entry")+'</button></div></div>'}if(!entries.length&&!mfOpen){s+='<div class="empty-state"><span class="empty-icon">⛽</span><p class="empty-text">No entries yet</p><p class="empty-sub">Add your first fuel entry above</p></div>'}[...entries].reverse().forEach(e=>{const dist=e.curKm-e.prevKm,l100=dist>0?(e.liters/dist)*100:0,cost=(e.costPerL||0)*e.liters;s+='<div class="m-entry"><div class="m-entry-top"><div class="m-entry-top-left"><span class="m-entry-date">'+fD(e.date)+'</span>'+(e.station?'<span class="m-entry-station">'+esc(e.station)+'</span>':'')+'</div><span class="m-entry-l100" style="color:'+c.color+'">'+fN(l100)+' L/100km</span></div>'+(e.address?'<div class="m-entry-addr">📍 '+esc(e.address)+'</div>':'')+'<div class="m-entry-details"><span class="m-entry-detail">⛽ '+fN(e.liters)+'L</span>'+(e.costPerL>0?'<span class="m-entry-detail">💲 '+fN(e.costPerL,3)+'/L</span>':'')+'<span class="m-entry-detail">📏 '+fN(dist,0)+' km</span>'+(cost>0?'<span class="m-entry-detail">💰 $'+fN(cost,2)+'</span>':'')+'</div><div class="m-entry-bottom"><span class="m-entry-odo">'+fN(e.prevKm,0)+' → '+fN(e.curKm,0)+' km</span><div class="m-entry-actions"><button class="m-entry-edit" onclick="editMF(\''+e.id+"')\">✎</button>"+(cfm===e.id?'<div class="inline-cf"><button class="icf-y" onclick="delMF(\''+e.id+"')\">✓</button><button class=\"icf-n\" onclick=\"cfm=null;rList()\">✕</button></div>":'<button class="m-entry-del" onclick="cfm=\''+e.id+"';rList()\">🗑</button>")+'</div></div></div>'});if(entries.length>0){s+='<div class="action-bar"><button class="act-btn" onclick="dL()">📋 Duplicate List</button></div>'}ct.innerHTML=s;if(mfOpen)mfCalc()}

function openMF(){mfOpen=true;mfEdit=null;rList()}
function editMF(id){const e=(items[aCat]||[]).find(x=>x.id==id);if(e){mfOpen=true;mfEdit=e;rList()}}
function mfCalc(){const lit=parseFloat($("mf-lit")?.value)||0,cur=parseFloat($("mf-cur")?.value)||0,prev=parseFloat($("mf-prev")?.value)||0,cpl=parseFloat($("mf-cpl")?.value)||0;const d=$("mf-calc");if(!d)return;if(lit>0&&cur>prev){const dist=cur-prev,l100=(lit/dist)*100,tc=cpl*lit;let h='<div class="mf-preview"><div class="mf-prev-item"><span class="mf-prev-lbl">Distance</span><span class="mf-prev-val">'+fN(dist,1)+' km</span></div><div class="mf-prev-item"><span class="mf-prev-lbl">Efficiency</span><span class="mf-prev-val" style="color:#4CAF50;font-weight:700">'+fN(l100)+' L/100km</span></div>';if(cpl>0){h+='<div class="mf-prev-item"><span class="mf-prev-lbl">Total Cost</span><span class="mf-prev-val">$'+fN(tc,2)+'</span></div><div class="mf-prev-item"><span class="mf-prev-lbl">Cost per km</span><span class="mf-prev-val">$'+fN(tc/dist,3)+'/km</span></div>'}d.innerHTML=h+'</div>'}else{d.innerHTML=""}}
function saveMF(){const date=$("mf-date")?.value,station=$("mf-station")?.value||"",address=$("mf-address")?.value?.trim()||"",cpl=parseFloat($("mf-cpl")?.value),lit=parseFloat($("mf-lit")?.value),cur=parseFloat($("mf-cur")?.value),prev=parseFloat($("mf-prev")?.value);if(!date||isNaN(lit)||isNaN(cur)||isNaN(prev)||lit<=0||cur<=prev)return;const entry={id:mfEdit?mfEdit.id:"i"+Date.now(),date,station,address,costPerL:isNaN(cpl)?0:cpl,liters:lit,curKm:cur,prevKm:prev};if(mfEdit){items[aCat]=(items[aCat]||[]).map(e=>e.id===mfEdit.id?entry:e);logChange('Edited fuel entry '+date+' in '+gC(aCat)?.name)}else{if(!items[aCat])items[aCat]=[];items[aCat].push(entry);logChange('Added fuel entry '+date+(station?' at '+station:'')+' to '+gC(aCat)?.name)}mfOpen=false;mfEdit=null;save();rList()}

function sXM(iid){const it=(items[aCat]||[]).find(i=>i.id===iid);if(!it)return;const ot=cats.filter(c=>c.id!==aCat);$("modals").innerHTML='<div class="modal-ov" onclick="clM()"><div class="xfer-modal" onclick="event.stopPropagation()"><div class="modal-title">Send item to...</div><div class="xfer-preview">'+esc(it.text)+"</div>"+(ot.length?ot.map(c=>'<div class="xfer-row"><div class="xfer-info"><span class="xfer-li">'+c.icon+'</span><span class="xfer-ln">'+esc(c.name)+'</span></div><div class="xfer-acts"><button class="xfer-ab xfer-copy" onclick="cpTo(\''+iid+"','"+c.id+"')\">Copy</button><button class=\"xfer-ab xfer-move\" onclick=\"mvTo('"+iid+"','"+c.id+"')\">Move</button></div></div>").join(""):'<p style="text-align:center;color:#666;padding:20px 0">No other lists.</p>')+'<button class="full-cancel" onclick="clM()">Cancel</button></div></div>'}
function cpTo(iid,tid){const it=(items[aCat]||[]).find(i=>i.id===iid);if(!it)return;if(!items[tid])items[tid]=[];items[tid].push({id:"i"+Date.now(),text:it.text,done:false});clM();save();rList()}
function mvTo(iid,tid){const it=(items[aCat]||[]).find(i=>i.id===iid);if(!it)return;items[aCat]=(items[aCat]||[]).filter(i=>i.id!==iid);if(!items[tid])items[tid]=[];items[tid].push({id:"i"+Date.now(),text:it.text,done:false});clM();save();rList()}

// Account with API key
function sAcct(){const email=user?user.email:"dev@localhost",name=user?user.email.split("@")[0]:"Dev";const ak=getApiKey();$("modals").innerHTML='<div class="modal-ov" onclick="clM()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">Account</div><div class="acct-row"><span class="acct-icon">👤</span><div><p class="acct-email">'+esc(name)+'</p><p class="acct-sub">'+esc(email)+'</p></div></div><div class="acct-actions"><button class="acct-btn" onclick="sChPw()"><span>🔒</span> Change Password</button><button class="acct-btn danger" onclick="doSignOut()"><span>↩</span> Sign Out</button></div><div class="modal-title" style="font-size:15px">💾 Backup & Restore</div><div class="acct-actions"><button class="acct-btn" onclick="createBackup()"><span>💾</span> Create Backup</button><button class="acct-btn" onclick="showRestoreList()"><span>📤</span> Restore from Backup</button></div><div id="backup-status"></div><div class="modal-title" style="font-size:15px">📷 AI Photo Recognition</div><div class="api-status '+(ak?"ok":"none")+'">'+(ak?"✓ API key saved":"⚠ No API key set")+'</div><p class="pw-label">Anthropic API Key</p><input class="api-input" id="api-key-input" type="password" placeholder="sk-ant-..." value="'+esc(ak)+'" /><p class="api-hint">Get your key at <b>console.anthropic.com</b>. Stored securely in your profile.</p><div id="api-save-status"></div><div class="m-btns"><button class="m-cancel" onclick="clM()">Close</button><button class="m-create" style="background:linear-gradient(135deg,#4CAF50,#2E7D32)" onclick="saveApiKey()">Save Key</button></div></div></div>'}
function doSignOut(){clM();if(unsub){unsub();unsub=null}if(!DEV_MODE)fbAuth.signOut()}
function createBackup(){
  if(!user||DEV_MODE)return;
  const st=$('backup-status');if(st)st.innerHTML='<div class="pw-msg ok">Saving backup...</div>';
  const changes=changeLog.length?changeLog.join(", "):"Manual backup";
  const data={categories:cats,items:items,anthropicKey:userApiKey,createdAt:firebase.firestore.FieldValue.serverTimestamp(),auto:false,changes:changes};
  changeLog=[];
  fbDb.collection("users").doc(user.uid).collection("backups").add(data).then(()=>{
    if(st)st.innerHTML='<div class="pw-msg ok">✓ Backup saved!</div>';
    setTimeout(()=>{if($('backup-status'))$('backup-status').innerHTML=''},3000);
  }).catch(e=>{
    if(st)st.innerHTML='<div class="pw-msg err">Error: '+esc(e.message)+'</div>';
  });
}
function showRestoreList(){
  if(!user||DEV_MODE)return;
  const st=$('backup-status');if(st)st.innerHTML='<div class="pw-msg ok">Loading backups...</div>';
  fbDb.collection("users").doc(user.uid).collection("backups").orderBy("createdAt","desc").limit(25).get().then(snap=>{
    if(snap.empty){if(st)st.innerHTML='<div class="pw-msg err">No backups found</div>';return}
    let h='<div style="margin-top:8px">';
    snap.forEach(doc=>{
      const d=doc.data();
      const date=d.createdAt?d.createdAt.toDate():new Date();
      const numLists=d.categories?d.categories.length:0;
      const numItems=d.items?Object.values(d.items).reduce((a,b)=>a+b.length,0):0;
      const badge=d.auto?'<span style="font-size:10px;color:#888;background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;margin-left:6px">auto</span>':'<span style="font-size:10px;color:#4CAF50;background:rgba(76,175,80,0.1);padding:2px 6px;border-radius:4px;margin-left:6px">manual</span>';
      const changes=d.changes||"";
      h+='<div style="background:rgba(255,255,255,0.04);border-radius:10px;margin-bottom:6px;padding:10px 12px"><div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:13px;font-weight:600;color:#ccc">'+date.toLocaleDateString()+' '+date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})+badge+'</div><div style="font-size:11px;color:#888">'+numLists+' lists, '+numItems+' items</div></div><button onclick="doRestore(\''+doc.id+'\')" style="background:linear-gradient(135deg,#2196F3,#1565C0);border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif">Restore</button></div>'+(changes?'<div style="font-size:11px;color:#666;margin-top:6px;line-height:1.4;border-top:1px solid rgba(255,255,255,0.04);padding-top:6px">'+esc(changes)+'</div>':'')+'</div>';
    });
    h+='</div>';
    if(st)st.innerHTML=h;
  }).catch(e=>{
    if(st)st.innerHTML='<div class="pw-msg err">Error: '+esc(e.message)+'</div>';
  });
}
function doRestore(backupId){
  if(!user||DEV_MODE)return;
  if(!confirm('This will replace ALL your current lists with this backup. Are you sure?'))return;
  const st=$('backup-status');if(st)st.innerHTML='<div class="pw-msg ok">Restoring...</div>';
  fbDb.collection("users").doc(user.uid).collection("backups").doc(backupId).get().then(doc=>{
    if(!doc.exists){if(st)st.innerHTML='<div class="pw-msg err">Backup not found</div>';return}
    const d=doc.data();
    cats=d.categories||[];items=d.items||{};
    if(d.anthropicKey)userApiKey=d.anthropicKey;
    save();
    if(st)st.innerHTML='<div class="pw-msg ok">✓ Restored '+cats.length+' lists!</div>';
    setTimeout(()=>{clM();rHome()},1500);
  }).catch(e=>{
    if(st)st.innerHTML='<div class="pw-msg err">Error: '+esc(e.message)+'</div>';
  });
}
function sChPw(){$("modals").innerHTML='<div class="modal-ov" onclick="clM()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">Change Password</div><div id="pw-msg-box"></div><p class="pw-label">Current Password</p><input class="pw-input" type="password" id="pw-cur" placeholder="Enter current password" /><p class="pw-label">New Password</p><input class="pw-input" type="password" id="pw-new" placeholder="Min 6 characters" /><p class="pw-label">Confirm New Password</p><input class="pw-input" type="password" id="pw-cfm" placeholder="Confirm new password" /><div class="m-btns"><button class="m-cancel" onclick="sAcct()">Back</button><button class="m-create" style="background:linear-gradient(135deg,#4CAF50,#2E7D32)" onclick="doChPw()">Update Password</button></div></div></div>';$("pw-cur").focus();$("pw-cfm").onkeydown=e=>{if(e.key==="Enter")doChPw()}}
function pwMsg(txt,ok){$("pw-msg-box").innerHTML='<div class="pw-msg '+(ok?"ok":"err")+'">'+esc(txt)+'</div>'}
async function doChPw(){const cur=$("pw-cur").value,nw=$("pw-new").value,cf=$("pw-cfm").value;if(!cur||!nw||!cf){pwMsg("Please fill in all fields",false);return}if(nw.length<6){pwMsg("Min 6 characters",false);return}if(nw!==cf){pwMsg("Passwords don't match",false);return}if(DEV_MODE){pwMsg("Changed! (dev)",true);setTimeout(()=>clM(),1500);return}try{const cred=firebase.auth.EmailAuthProvider.credential(user.email,cur);await user.reauthenticateWithCredential(cred);await user.updatePassword(nw);pwMsg("Password updated!",true);setTimeout(()=>clM(),1500)}catch(e){const m={"auth/wrong-password":"Current password is incorrect","auth/invalid-credential":"Current password is incorrect","auth/too-many-requests":"Too many attempts","auth/weak-password":"Password too weak"};pwMsg(m[e.code]||"Error: "+e.message,false)}}

// Globals
window.rHome=rHome;window.rList=rList;window.oList=oList;window.sHome=sHome;window.aI=aI;window.reAnalyze=reAnalyze;window.tI=tI;window.dI=dI;window.cD=cD;window.uA=uA;window.dL=dL;window.dCat=dCat;window.clM=clM;window.sNLM=sNLM;window.cCat=cCat;window.sIM=sIM;window.sIC=sIC;window.sXM=sXM;window.cpTo=cpTo;window.mvTo=mvTo;window.sN=sN;window.sIE=sIE;window.toggleReorder=toggleReorder;window.sAcct=sAcct;window.doSignOut=doSignOut;window.createBackup=createBackup;window.showRestoreList=showRestoreList;window.doRestore=doRestore;window.sChPw=sChPw;window.doChPw=doChPw;window.saveApiKey=saveApiKey;window.setApiKey=saveApiKey;window.openMF=openMF;window.editMF=editMF;window.saveMF=saveMF;window.delMF=delMF;window.mfCalc=mfCalc;window.getLoc=getLoc;window.viewImg=viewImg;
Object.defineProperty(window,'cfm',{get(){return cfm},set(v){cfm=v}});
Object.defineProperty(window,'eiId',{get(){return eiId},set(v){eiId=v}});
Object.defineProperty(window,'eLN',{get(){return eLN},set(v){eLN=v}});
Object.defineProperty(window,'mfOpen',{get(){return mfOpen},set(v){mfOpen=v}});
Object.defineProperty(window,'mfEdit',{get(){return mfEdit},set(v){mfEdit=v}});
Object.defineProperty(window,'pendingImg',{get(){return pendingImg},set(v){pendingImg=v}});
Object.defineProperty(window,'pendingLabel',{get(){return pendingLabel},set(v){pendingLabel=v}});
Object.defineProperty(window,'aiLoading',{get(){return aiLoading},set(v){aiLoading=v}});

if(DEV_MODE)setupDev();else setupAuth();
}
</script>
