<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Lists">
<meta name="theme-color" content="#0f1117">
<title>My Lists</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d2e;
    --bg-card: rgba(255,255,255,0.05);
    --text-primary: #e8e8ed;
    --text-secondary: #888;
    --text-muted: #555;
    --border-subtle: rgba(255,255,255,0.06);
    --border-light: rgba(255,255,255,0.1);
    --green: #4CAF50;
    --green-dark: #2E7D32;
    --orange: #FF9800;
    --blue: #2196F3;
    --red: #e53935;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%);
    color: var(--text-primary);
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
  }

  /* Header */
  .header {
    padding: calc(16px + var(--safe-top)) 20px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(15,17,23,0.92);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    border-radius: 10px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    font-family: 'Space Mono', monospace;
  }

  .back-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    color: var(--text-primary);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .header-title span { font-size: 24px; }

  .header-spacer { width: 70px; }

  /* Content */
  .content {
    padding: 16px 20px calc(40px + var(--safe-bottom));
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 18px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
    animation: fadeSlideIn 0.4s ease both;
  }

  .card:active { transform: scale(0.97); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .card-icon { font-size: 32px; }

  .card-delete {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #999;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }

  .card-count {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }

  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Add Card */
  .add-card {
    border: 2px dashed rgba(255,255,255,0.12);
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 140px;
  }

  .add-card-plus { font-size: 32px; color: #666; margin-bottom: 6px; font-weight: 300; }
  .add-card-text { font-size: 13px; color: #666; font-weight: 500; }

  /* Confirm Overlay on Card */
  .confirm-overlay {
    position: absolute;
    inset: 0;
    background: rgba(15,17,23,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 16px;
    z-index: 5;
  }

  .confirm-text { font-size: 14px; font-weight: 500; margin-bottom: 12px; }

  .confirm-btns { display: flex; gap: 10px; }

  .confirm-yes, .confirm-no {
    border: none;
    padding: 6px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .confirm-yes { background: var(--red); color: #fff; }
  .confirm-no { background: rgba(255,255,255,0.1); color: var(--text-primary); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
    animation: scaleIn 0.2s ease;
  }

  .modal {
    background: #1e2030;
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 340px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 18px;
    letter-spacing: -0.02em;
  }

  .modal input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    margin-bottom: 18px;
  }

  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

  .modal-cancel {
    background: rgba(255,255,255,0.06);
    border: none;
    color: #999;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .modal-create {
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    border: none;
    color: #fff;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* Item Input */
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .input-row input {
    flex: 1;
    padding: 14px 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border-light);
    border-radius: 14px;
    color: var(--text-primary);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }

  .add-btn {
    width: 50px;
    height: 50px;
    border-radius: 14px;
    border: none;
    color: #fff;
    font-size: 24px;
    font-weight: 300;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* List Progress */
  .list-progress {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .list-progress .progress-track {
    flex: 1;
    height: 6px;
  }

  .progress-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 600;
    min-width: 36px;
    text-align: right;
  }

  /* Items */
  .item-list { display: flex; flex-direction: column; gap: 2px; }

  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 6px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    animation: fadeSlideIn 0.3s ease both;
  }

  .item.done { opacity: 0.5; }

  .checkbox {
    width: 26px;
    height: 26px;
    border-radius: 8px;
    border: 2px solid;
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }

  .item-text {
    flex: 1;
    font-size: 15px;
    line-height: 1.4;
    cursor: pointer;
    word-break: break-word;
  }

  .item.done .item-text { text-decoration: line-through; }

  .item-edit {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--text-primary);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }

  .item-delete {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 4px 6px;
    opacity: 0.45;
    flex-shrink: 0;
  }

  .inline-confirm { display: flex; gap: 4px; flex-shrink: 0; }

  .inline-yes, .inline-no {
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .inline-yes { background: var(--red); color: #fff; }
  .inline-no { background: rgba(255,255,255,0.1); color: var(--text-primary); }

  /* Completed Section */
  .completed-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0 8px;
    margin-top: 8px;
  }

  .completed-label {
    font-size: 13px;
    color: #666;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .clear-btn {
    background: none;
    border: none;
    color: var(--red);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* Empty State */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    text-align: center;
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-text { font-size: 17px; font-weight: 600; color: #666; margin-bottom: 6px; }
  .empty-subtext { font-size: 14px; color: var(--text-muted); }

  /* Hidden */
  .hidden { display: none !important; }

  /* Animations */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- HOME VIEW -->
  <div id="home-view">
    <div class="header">
      <div class="logo">
        <span class="logo-icon">✓</span> My Lists
      </div>
    </div>
    <div class="content">
      <div class="grid" id="category-grid"></div>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div id="list-view" class="hidden">
    <div class="header">
      <button class="back-btn" onclick="showHome()">← Back</button>
      <div class="header-title" id="list-header-title"></div>
      <div class="header-spacer"></div>
    </div>
    <div class="content">
      <div class="input-row">
        <input type="text" id="new-item-input" placeholder="Add an item..." />
        <button class="add-btn" id="add-item-btn" onclick="addItem()">+</button>
      </div>
      <div class="list-progress" id="list-progress">
        <div class="progress-track">
          <div class="progress-bar" id="list-progress-bar"></div>
        </div>
        <span class="progress-label" id="list-progress-label">0%</span>
      </div>
      <div class="item-list" id="item-list"></div>
    </div>
  </div>

  <!-- NEW LIST MODAL -->
  <div class="modal-overlay hidden" id="new-list-modal" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Create New List</div>
      <input type="text" id="new-list-name" placeholder="List name..." />
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-create" onclick="createCategory()">Create</button>
      </div>
    </div>
  </div>
</div>

<script>
// Default categories
const DEFAULT_CATEGORIES = [
  { id: "grocery", name: "Grocery List", icon: "🛒", color: "#4CAF50" },
  { id: "parts", name: "Parts List", icon: "🔧", color: "#FF9800" },
  { id: "trip", name: "Trip Prep", icon: "✈️", color: "#2196F3" },
];

const ICONS = ["📋","📦","🏠","🎯","⭐","📌","🗂️","💼","🎒","🛠️","📝","🏗️"];
const COLORS = ["#9C27B0","#E91E63","#00BCD4","#795548","#607D8B","#FF5722","#3F51B5","#009688"];

let categories = [];
let items = {};
let activeCategory = null;
let confirmDeleteId = null;
let editingItemId = null;

// Storage
function loadData() {
  try {
    const raw = localStorage.getItem("mylistsapp");
    if (raw) {
      const data = JSON.parse(raw);
      categories = data.categories || DEFAULT_CATEGORIES;
      items = data.items || {};
    } else {
      categories = [...DEFAULT_CATEGORIES];
      items = {};
    }
  } catch (e) {
    categories = [...DEFAULT_CATEGORIES];
    items = {};
  }
}

function saveData() {
  try {
    localStorage.setItem("mylistsapp", JSON.stringify({ categories, items }));
  } catch (e) {
    console.error("Save failed", e);
  }
}

// Helpers
function getProgress(catId) {
  const list = items[catId] || [];
  if (list.length === 0) return 0;
  return Math.round((list.filter(i => i.done).length / list.length) * 100);
}

function getCat(id) {
  return categories.find(c => c.id === id);
}

function isDefault(id) {
  return DEFAULT_CATEGORIES.some(d => d.id === id);
}

// Render Home
function renderHome() {
  const grid = document.getElementById("category-grid");
  grid.innerHTML = "";

  categories.forEach((cat, idx) => {
    const list = items[cat.id] || [];
    const doneCount = list.filter(i => i.done).length;
    const progress = getProgress(cat.id);

    const card = document.createElement("div");
    card.className = "card";
    card.style.borderLeft = `4px solid ${cat.color}`;
    card.style.animationDelay = `${idx * 0.08}s`;
    card.onclick = () => openList(cat.id);

    let deleteBtn = "";
    if (!isDefault(cat.id)) {
      deleteBtn = `<button class="card-delete" onclick="event.stopPropagation(); confirmDeleteCategory('${cat.id}')">×</button>`;
    }

    let progressHTML = "";
    if (list.length > 0) {
      progressHTML = `<div class="progress-track"><div class="progress-bar" style="width:${progress}%;background:${cat.color}"></div></div>`;
    }

    let confirmHTML = "";
    if (confirmDeleteId === `cat-${cat.id}`) {
      confirmHTML = `
        <div class="confirm-overlay" onclick="event.stopPropagation()">
          <p class="confirm-text">Delete this list?</p>
          <div class="confirm-btns">
            <button class="confirm-yes" onclick="deleteCategory('${cat.id}')">Yes</button>
            <button class="confirm-no" onclick="cancelConfirm()">No</button>
          </div>
        </div>`;
    }

    card.innerHTML = `
      <div class="card-top">
        <span class="card-icon">${cat.icon}</span>
        ${deleteBtn}
      </div>
      <div class="card-title">${cat.name}</div>
      <div class="card-count">${list.length === 0 ? "No items" : `${doneCount}/${list.length} done`}</div>
      ${progressHTML}
      ${confirmHTML}
    `;
    grid.appendChild(card);
  });

  // Add card
  const addCard = document.createElement("div");
  addCard.className = "card add-card";
  addCard.onclick = () => document.getElementById("new-list-modal").classList.remove("hidden");
  addCard.innerHTML = `<span class="add-card-plus">+</span><p class="add-card-text">New List</p>`;
  grid.appendChild(addCard);
}

// List View
function openList(catId) {
  activeCategory = catId;
  const cat = getCat(catId);
  document.getElementById("home-view").classList.add("hidden");
  document.getElementById("list-view").classList.remove("hidden");
  document.getElementById("list-header-title").innerHTML = `<span>${cat.icon}</span> ${cat.name}`;
  document.getElementById("add-item-btn").style.background = cat.color;
  document.getElementById("new-item-input").value = "";
  confirmDeleteId = null;
  editingItemId = null;
  renderItems();
}

function showHome() {
  activeCategory = null;
  document.getElementById("list-view").classList.add("hidden");
  document.getElementById("home-view").classList.remove("hidden");
  renderHome();
}

function renderItems() {
  const cat = getCat(activeCategory);
  const list = items[activeCategory] || [];
  const pending = list.filter(i => !i.done);
  const completed = list.filter(i => i.done);
  const progress = getProgress(activeCategory);

  // Progress
  const progContainer = document.getElementById("list-progress");
  if (list.length > 0) {
    progContainer.classList.remove("hidden");
    document.getElementById("list-progress-bar").style.width = progress + "%";
    document.getElementById("list-progress-bar").style.background = cat.color;
    document.getElementById("list-progress-label").textContent = progress + "%";
  } else {
    progContainer.classList.add("hidden");
  }

  const container = document.getElementById("item-list");
  container.innerHTML = "";

  if (list.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">${cat.icon}</span>
        <p class="empty-text">No items yet</p>
        <p class="empty-subtext">Add your first item above</p>
      </div>`;
    return;
  }

  // Pending items
  pending.forEach(item => {
    container.appendChild(createItemEl(item, cat, false));
  });

  // Completed
  if (completed.length > 0) {
    const header = document.createElement("div");
    header.className = "completed-header";
    header.innerHTML = `
      <span class="completed-label">Completed (${completed.length})</span>
      <button class="clear-btn" onclick="clearCompleted()">Clear all</button>`;
    container.appendChild(header);

    completed.forEach(item => {
      container.appendChild(createItemEl(item, cat, true));
    });
  }
}

function createItemEl(item, cat, isDone) {
  const div = document.createElement("div");
  div.className = "item" + (isDone ? " done" : "");

  const cb = document.createElement("button");
  cb.className = "checkbox";
  cb.style.borderColor = cat.color;
  if (isDone) {
    cb.style.background = cat.color;
    cb.innerHTML = "✓";
  }
  cb.onclick = () => toggleItem(item.id);

  let textEl;
  if (editingItemId === item.id) {
    textEl = document.createElement("input");
    textEl.className = "item-edit";
    textEl.value = item.text;
    textEl.onkeydown = (e) => {
      if (e.key === "Enter") saveEdit(item.id, textEl.value);
      if (e.key === "Escape") { editingItemId = null; renderItems(); }
    };
    textEl.onblur = () => saveEdit(item.id, textEl.value);
    setTimeout(() => textEl.focus(), 50);
  } else {
    textEl = document.createElement("span");
    textEl.className = "item-text";
    textEl.textContent = item.text;
    if (!isDone) textEl.onclick = () => { editingItemId = item.id; renderItems(); };
  }

  div.appendChild(cb);
  div.appendChild(textEl);

  if (confirmDeleteId === item.id) {
    const conf = document.createElement("div");
    conf.className = "inline-confirm";
    conf.innerHTML = `
      <button class="inline-yes" onclick="deleteItem('${item.id}')">✓</button>
      <button class="inline-no" onclick="cancelConfirm()">✕</button>`;
    div.appendChild(conf);
  } else {
    const del = document.createElement("button");
    del.className = "item-delete";
    del.textContent = "🗑";
    del.onclick = () => { confirmDeleteId = item.id; renderItems(); };
    div.appendChild(del);
  }

  return div;
}

// Actions
function addItem() {
  const input = document.getElementById("new-item-input");
  const text = input.value.trim();
  if (!text || !activeCategory) return;

  if (!items[activeCategory]) items[activeCategory] = [];
  items[activeCategory].push({ id: "item-" + Date.now(), text, done: false });
  input.value = "";
  saveData();
  renderItems();
}

function toggleItem(itemId) {
  const list = items[activeCategory] || [];
  const item = list.find(i => i.id === itemId);
  if (item) item.done = !item.done;
  saveData();
  renderItems();
}

function deleteItem(itemId) {
  items[activeCategory] = (items[activeCategory] || []).filter(i => i.id !== itemId);
  confirmDeleteId = null;
  saveData();
  renderItems();
}

function saveEdit(itemId, newText) {
  if (newText.trim()) {
    const item = (items[activeCategory] || []).find(i => i.id === itemId);
    if (item) item.text = newText.trim();
    saveData();
  }
  editingItemId = null;
  renderItems();
}

function clearCompleted() {
  items[activeCategory] = (items[activeCategory] || []).filter(i => !i.done);
  saveData();
  renderItems();
}

function confirmDeleteCategory(catId) {
  confirmDeleteId = `cat-${catId}`;
  renderHome();
}

function deleteCategory(catId) {
  categories = categories.filter(c => c.id !== catId);
  delete items[catId];
  confirmDeleteId = null;
  saveData();
  renderHome();
}

function cancelConfirm() {
  confirmDeleteId = null;
  if (activeCategory) renderItems();
  else renderHome();
}

function createCategory() {
  const input = document.getElementById("new-list-name");
  const name = input.value.trim();
  if (!name) return;

  const newCat = {
    id: "custom-" + Date.now(),
    name,
    icon: ICONS[Math.floor(Math.random() * ICONS.length)],
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
  };
  categories.push(newCat);
  input.value = "";
  closeModal();
  saveData();
  renderHome();
}

function closeModal() {
  document.getElementById("new-list-modal").classList.add("hidden");
  document.getElementById("new-list-name").value = "";
}

// Enter key for inputs
document.getElementById("new-item-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") addItem();
});
document.getElementById("new-list-name").addEventListener("keydown", (e) => {
  if (e.key === "Enter") createCategory();
});

// Init
loadData();
renderHome();
</script>
</body>
</html>
